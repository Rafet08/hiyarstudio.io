<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вопрос</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top,#6ea8ff 0%,transparent 40%),
        radial-gradient(circle at bottom,#ffb3d9 0%,transparent 40%),
        #f5f5f7;
    overflow:hidden;
}

.card{
    width:430px;
    padding:50px;
    border-radius:32px;
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    box-shadow:0 30px 80px rgba(0,0,0,.15);
    text-align:center;
    animation:show .8s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:42px;
    color:#1d1d1f;
    margin-bottom:15px;
}

p{
    color:#6e6e73;
    margin-bottom:35px;
    font-size:18px;
}

.buttons{
    display:flex;
    gap:15px;
    justify-content:center;
}

button{
    flex:1;
    border:none;
    border-radius:18px;
    padding:16px;
    font-size:20px;
    cursor:pointer;
    transition:.25s;
}

#yes{
    background:#0071e3;
    color:white;
}

#yes:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(0,113,227,.35);
}

#no{
    background:#ececec;
    color:#1d1d1f;
}

#no:hover{
    transform:translateY(-3px);
}

.instagram{
    position:fixed;
    right:30px;
    bottom:30px;
    text-decoration:none;
    color:#1d1d1f;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(20px);
    padding:14px 22px;
    border-radius:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    transition:.3s;
}

.instagram:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">

<h1>Рома хыяр? 🤔</h1>

<p>Выберите один из вариантов</p>

<div class="buttons" id="buttons">
    <button id="yes">Да</button>
    <button id="no">Нет</button>
</div>

</div>

<a class="instagram"
href="https://www.instagram.com/rafet_08_/?__pwa=1#"
target="_blank">
📷 Instagram
</a>

<script>

const yes=document.getElementById("yes");
const no=document.getElementById("no");
const buttons=document.getElementById("buttons");

no.onclick=()=>{

    if(buttons.firstElementChild===yes){
        buttons.insertBefore(no,yes);
    }else{
        buttons.insertBefore(yes,no);
    }

}

yes.onclick=()=>{

window.open("https://www.youtube.com/watch?v=xJzVUZ3nX9g","_blank");

}

</script>

</body>
</html>
