<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>РОМА МАЛ GAME</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(#87CEEB,#ffffff);
overflow:hidden;
touch-action:manipulation;
user-select:none;
}

.marquee{
position:fixed;
top:0;
left:0;
width:100%;
height:50px;
background:#ff0000;
color:white;
font-size:28px;
font-weight:bold;
line-height:50px;
overflow:hidden;
z-index:999;
}

.marquee span{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:move 8s linear infinite;
}

@keyframes move{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-100%);
}

}

#game{
position:relative;
margin:70px auto;
width:95%;
max-width:900px;
height:320px;
background:white;
border:4px solid #222;
border-radius:15px;
overflow:hidden;
}

#ground{
position:absolute;
bottom:0;
width:100%;
height:60px;
background:#C79C63;
}

#player{
position:absolute;
left:80px;
bottom:60px;
width:80px;
height:80px;
background:url(img/Снимок\ экрана\ 2026-06-27\ 135726.png) center center/contain no-repeat;
}

.cactus{
position:absolute;
bottom:60px;
width:40px;
height:60px;
background:#0a8f08;
border-radius:6px;
}

#score{
position:absolute;
top:15px;
left:15px;
font-size:28px;
font-weight:bold;
}

#gameOver{
display:none;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.75);
padding:30px;
border-radius:15px;
text-align:center;
color:white;
}

button{
margin-top:15px;
padding:12px 24px;
font-size:20px;
border:none;
border-radius:10px;
background:#2196f3;
color:white;
cursor:pointer;
}

@media(max-width:700px){

#game{

height:260px;

}

#player{

width:65px;
height:65px;
left:30px;

}

.cactus{

width:30px;

}

#score{

font-size:22px;

}

}

</style>
</head>

<body>

<div class="marquee">
<span>
РОМА МАЛ • РОМА МАЛ • РОМА МАЛ • РОМА МАЛ • РОМА МАЛ •
</span>
</div>

<div id="game">

<div id="score">0</div>

<div id="player"></div>

<div id="ground"></div>

<div id="gameOver">

<h1>Игра окончена</h1>

<button onclick="location.reload()">
Играть снова
</button>

</div>
<script>

const game = document.getElementById("game");
const player = document.getElementById("player");
const score = document.getElementById("score");
const gameOver = document.getElementById("gameOver");

let jump = false;
let playerY = 0;
let velocity = 0;
const gravity = 0.7;

let points = 0;
let speed = 8;
let playing = true;

// Прыжок
function doJump(){

    if(jump || !playing) return;

    jump = true;
    velocity = 19; // высокий прыжок

}

// Клавиатура
document.addEventListener("keydown",(e)=>{

    if(e.code==="Space" || e.code==="ArrowUp"){

        e.preventDefault();
        doJump();

    }

});

// Телефон — прыжок по касанию
game.addEventListener("touchstart",(e)=>{

    e.preventDefault();
    doJump();

});

// Клик мышью
game.addEventListener("mousedown",doJump);

// Обновление игрока
function updatePlayer(){

    if(jump){

        velocity -= gravity;
        playerY += velocity;

        if(playerY <= 0){

            playerY = 0;
            jump = false;

        }

    }

    player.style.bottom = (60 + playerY) + "px";

}

// Главный цикл игры
function animate(){

    updatePlayer();

    requestAnimationFrame(animate);

}

animate();
// Создание кактуса
function createCactus(){

    if(!playing) return;

    const cactus = document.createElement("div");
    cactus.className = "cactus";

    // Небольшая случайная высота
    cactus.style.height = (45 + Math.random() * 20) + "px";

    game.appendChild(cactus);

    let x = game.clientWidth + 50;
    cactus.style.left = x + "px";

    const move = setInterval(()=>{

        if(!playing){
            clearInterval(move);
            return;
        }

        x -= speed;
        cactus.style.left = x + "px";

        const p = player.getBoundingClientRect();
        const c = cactus.getBoundingClientRect();

        // Столкновение
        if(
            p.right > c.left + 8 &&
            p.left < c.right - 8 &&
            p.bottom > c.top + 8 &&
            p.top < c.bottom - 8
        ){

            playing = false;
            gameOver.style.display = "block";
            clearInterval(move);
            return;

        }

        // Кактус ушёл за экран
        if(x < -60){

            clearInterval(move);
            cactus.remove();

            points++;
            score.textContent = points;

            // Каждые 5 очков немного ускоряем игру
            if(points % 5 === 0){
                speed += 0.5;
            }

        }

    },20);

}

// Новый кактус каждые 2.2 секунды
setInterval(()=>{

    if(playing){
        createCactus();
    }

},2200);
function restartGame(){

    location.reload();

}

// Если нажата кнопка "Играть снова"
const restartButton = document.querySelector("#gameOver button");

if(restartButton){

    restartButton.addEventListener("click",restartGame);

}

// Чтобы страница не прокручивалась на телефоне
document.addEventListener("touchmove",function(e){

    e.preventDefault();

},{passive:false});

// Запускаем первый кактус немного позже
setTimeout(function(){

    if(playing){

        createCactus();

    }

},1500);

</script>

</div>

</body>
</html>
