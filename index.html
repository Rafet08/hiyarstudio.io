
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhavgorode</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(to bottom,#87CEEB,#E0F7FF);
}

#menu{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;

}

}

}

button{

#game{

}

#ground{
position:absolute;
bottom:0;

background:#73b84d;

}

#player{
position:absolute;
left:120px;
bottom:120px;

background:url(img/WhatsApp\ Image\ 2026-06-16\ at\ 11.13.44.jpeg);
background-size:contain;
background-repeat:no-repeat;
background-position:center;
}

#score{
position:absolute;
left:20px;
top:20px;
font-size:28px;
font-weight:bold;
}

#speed{
position:absolute;
left:20px;
top:60px;
font-size:22px;
}

.cactus{
position:absolute;
bottom:120px;
width:60px;
height:100px;
}

.body{
position:absolute;
left:22px;
bottom:0;
width:16px;
height:100px;
background:#148214;
border-radius:10px;
}

.arm1{
position:absolute;
left:0;
bottom:35px;
width:22px;
height:12px;
background:#148214;
border-radius:10px;
}

.arm1::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:12px;
height:35px;
background:#148214;
border-radius:10px;
}

.arm2{
position:absolute;

bottom:55px;

<body>

<div id="menu">
<h1>Muhavgorode</h1>
<p>Прыгай через кактусы и ставь рекорды</p>
<button onclick="startGame()">Играть</button>
</div>

<div id="game">

<div id="score">Очки: 0</div>
<div id="speed">Скорость: 8</div>

<div id="player"></div>

<div id="ground"></div>

<div id="gameOver">
<h2>Игра окончена</h2>
<button onclick="location.reload()">
Играть снова
</button>
</div>

</div>

<script>

const menu = document.getElementById("menu");
const game = document.getElementById("game");
const player = document.getElementById("player");

const scoreText = document.getElementById("score");
const speedText = document.getElementById("speed");
const gameOverScreen = document.getElementById("gameOver");

let jumping = false;
let gameOver = false;

let score = 0;
let speed = 8;

function startGame(){

menu.style.display="none";
game.style.display="block";

setTimeout(()=>{
createCactus();
},5000);

}

function jump(){

if(jumping || gameOver) return;

jumping = true;

speed = Math.min(speed + 0.4,25);

speedText.textContent =
"Скорость: " + speed.toFixed(1);

let position = 120;

let up = setInterval(()=>{

if(position >= 280){

clearInterval(up);

let down = setInterval(()=>{

if(position <= 120){

clearInterval(down);
jumping = false;
}

position -= 6;
player.style.bottom =
position + "px";

},15);

}

position += 6;
player.style.bottom =
position + "px";

},15);

}

document.addEventListener("keydown",(e)=>{
if(e.code==="Space" || e.code==="ArrowUp"){
jump();
}
});

document.addEventListener("touchstart",()=>{
jump();
});

document.addEventListener("click",(e)=>{
if(e.target.tagName !== "BUTTON"){
jump();
}
});

function createCactus(){

if(gameOver) return;

const cactus =
document.createElement("div");

cactus.className = "cactus";

cactus.innerHTML = `
<div class="body"></div>
<div class="arm1"></div>
<div class="arm2"></div>
`;

game.appendChild(cactus);

let left = window.innerWidth;

cactus.style.left = left + "px";

const move = setInterval(()=>{

left -= speed;

cactus.style.left =
left + "px";

const playerBottom =
parseInt(
window.getComputedStyle(player)
.getPropertyValue("bottom")
);

if(
left > 70 &&
left < 170 &&
playerBottom < 190
){

gameOver = true;

gameOverScreen.style.display =
"block";

clearInterval(move);
}

if(left < -80){

cactus.remove();

score++;

scoreText.textContent =
"Очки: " + score;

clearInterval(move);
}

},20);

let random =
Math.random()*2000 + 1500;

setTimeout(createCactus,random);
}

</script>

</body>
</html>
