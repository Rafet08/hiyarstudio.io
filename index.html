<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Для тебя ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

background:linear-gradient(-45deg,#ff9ecf,#ffd6ec,#d8c2ff,#9fdcff);
background-size:400% 400%;
animation:bg 12s infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.hearts{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;

}

.hearts span{

position:absolute;
bottom:-50px;
animation:fly linear infinite;
opacity:.8;

}

@keyframes fly{

0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

.card{

width:92%;
max-width:700px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.3);

border-radius:35px;

padding:45px;

box-shadow:0 25px 60px rgba(0,0,0,.2);

text-align:center;

z-index:5;

}

.logo{

font-size:60px;

margin-bottom:10px;

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{
transform:scale(1.15);
}

}

h1{

color:white;
font-size:38px;

margin-bottom:15px;

}

#question{

color:white;
font-size:28px;

font-weight:600;

margin:40px 0;

min-height:90px;

}

.buttons{

display:flex;

justify-content:center;

gap:25px;

margin-top:10px;

}

button{

border:none;

padding:17px 42px;

font-size:20px;

font-weight:bold;

border-radius:50px;

cursor:pointer;

transition:.3s;

}

#yes{

background:#ff2d55;

color:white;

box-shadow:0 12px 30px rgba(255,45,85,.4);

}

#yes:hover{

transform:scale(1.08);

}

#no{

background:white;

color:#444;

}

#result{

margin-top:35px;

font-size:28px;

color:white;

font-weight:bold;

}

.roma-photo{

width:260px;

max-width:90%;

border-radius:25px;

margin-top:25px;

box-shadow:0 20px 40px rgba(0,0,0,.35);

animation:showPhoto .8s;

}

@keyframes showPhoto{

0%{

opacity:0;

transform:scale(.5);

}

100%{

opacity:1;

transform:scale(1);

}

}

.creator{

position:fixed;

right:20px;

bottom:20px;

padding:12px 20px;

border-radius:30px;

background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);

color:white;

font-weight:bold;

text-decoration:none;

box-shadow:0 10px 25px rgba(0,0,0,.3);

transition:.3s;

}

.creator:hover{

transform:scale(1.1);

}

@media(max-width:700px){

.card{

padding:25px;

}

h1{

font-size:28px;

}

#question{

font-size:22px;

}

button{

font-size:18px;

padding:15px 25px;

}

}

</style>

</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="card">

<div class="logo">❤️</div>

<h1>Вопросы про Рому</h1>

<div id="question">

Тебе нравится Рома?

</div>

<div class="buttons">

<button id="yes">Да ❤️</button>

<button id="no">Нет 🙈</button>

</div>

<div id="result"></div>

</div>

<a class="creator"
href="https://www.instagram.com/rafet_08_/?__pwa=1#
target="_blank">

📷 Создатель

</a>

<script>
    const questions = [
"Тебе нравится Рома? ❤️",
"Рома красивый? 😍",
"Рома милый? 🥰",
"Рома смешной? 😂",
"Хотела бы пойти с Ромой на свидание? 🌹",
"Ты часто думаешь о Роме? 💭",
"Рома заслуживает объятий? 🤗",
"Рома самый лучший? 💖",
"Любишь Рому? ❤️"
];

let current = 0;

const question = document.getElementById("question");
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const result = document.getElementById("result");
const buttons = document.querySelector(".buttons");

let swap = false;

yes.onclick = function(){

current++;

if(current < questions.length){

question.innerHTML = questions[current];

}else{

buttons.style.display="none";

question.innerHTML="🎉 Поздравляем!";

result.innerHTML=`

<h2>Теперь официально считается, что ты любишь Рому ❤️</h2>

<img src="img/imgplayer.png.png.png" class="roma-photo">

<p style="margin-top:20px;font-size:24px;">
🥰 Это Рома 🥰
</p>

`;

confetti();

}

};

no.onclick = function(){

if(!swap){

buttons.appendChild(yes);
buttons.appendChild(no);

}else{

buttons.appendChild(no);
buttons.appendChild(yes);

}

swap=!swap;

};

const hearts=document.getElementById("hearts");

for(let i=0;i<40;i++){

const heart=document.createElement("span");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(18+Math.random()*25)+"px";

heart.style.animationDuration=(5+Math.random()*6)+"s";

heart.style.animationDelay=Math.random()*5+"s";

hearts.appendChild(heart);

}

function confetti(){

for(let i=0;i<120;i++){

const e=document.createElement("span");

e.innerHTML=["❤️","💖","✨","🎉"][Math.floor(Math.random()*4)];

e.style.position="fixed";
e.style.left=Math.random()*100+"vw";
e.style.top="-30px";
e.style.fontSize=(18+Math.random()*20)+"px";
e.style.transition="4s linear";

document.body.appendChild(e);

setTimeout(()=>{

e.style.transform="translateY(120vh) rotate(720deg)";

},30);

setTimeout(()=>{

e.remove();

},4200);

}

}

</script>

</body>
</html>
